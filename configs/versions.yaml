preprocessing_versions:
  v1:
    description: Sepsis-3 cohort, first 24h aggregation, median imputation for numeric variables, null for discrete variables.
    window_hours: 24
    continuous_aggregation: mean
    numeric_imputation: median
    discrete_imputation: null
    minimum_age_years: 18
    minimum_icu_los_days: 1
    require_discharge_information: true
    missing_rate_threshold: 0.70
    output_dir: data/derived/preprocessing/v1

filtered_versions:
  v1:
    description: Filtered cohort produced from preprocessing v1.
    based_on: preprocessing/v1
    output_dir: data/derived/filtered/v1
